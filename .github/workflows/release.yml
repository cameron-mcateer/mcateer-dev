name: release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure dispatched against a release tag
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "::error::This workflow can only be run against a tag. Got '${GITHUB_REF}'."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != release-* ]]; then
            echo "::error::Only 'release-*' tags can be promoted. Got '${GITHUB_REF_NAME}'."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Force-push release branch to tag
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          git push --force origin "${SHA}:refs/heads/release"
          {
            echo "### Release promoted"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Commit: \`${SHA}\`"
            echo "- \`release\` branch now points at this commit."
            echo "- Cloudflare Workers Builds will pick up the push and deploy."
          } >> "$GITHUB_STEP_SUMMARY"
